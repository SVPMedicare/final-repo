<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVP Medicare LLP | Abbott Distributor Hyderabad | Pharma Supplier India</title>
<meta name="description" content="SVP Medicare LLP is a trusted Abbott distributor in Hyderabad supplying pharma and healthcare products across India to stokist, hospitals, pharmacies and institutions.">

<link rel="icon" href="favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
font-family:'Roboto',sans-serif;
background:#f9fbfd;color:#1e1e1e;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
letter-spacing:.2px;
}

/* LOADER */
#loader{position:fixed;top:0;left:0;height:4px;width:0;background:#003566;z-index:9999;transition:width .4s, opacity .4s}

/* GLASS HEADER */
header{
position:sticky;top:0;z-index:1000;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.75);
padding:18px 8%;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
transition:all .3s ease;
border-radius:0 0 12px 12px;
}
header.scrolled{
box-shadow:0 10px 35px rgba(0,0,0,0.15);
background:rgba(255,255,255,0.95);
}
header img{height:60px}
nav a{margin-left:30px;text-decoration:none;color:#003566;font-weight:600;position:relative;transition:.3s}
nav a:hover{color:#001d3d;}
nav a.active{color:#001d3d}
nav a.active::after{
content:"";position:absolute;bottom:-6px;left:0;width:100%;height:3px;background:#003566;border-radius:3px;
transition:.3s;
}

/* HERO */
.hero{
display:flex;justify-content:space-between;align-items:center;
padding:120px 8%;
background:linear-gradient(-45deg,#003566,#001d3d,#002855,#001233);
background-size:400% 400%;
animation:heroGradient 12s ease infinite;
color:#fff;
border-radius:18px;
position:relative;
overflow:hidden;
}
@keyframes heroGradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.hero h1{font-size:3rem;margin-bottom:20px;font-family:'Montserrat',sans-serif;}
.hero p{color:#dbe7ff;margin-bottom:30px;font-size:1.1rem;line-height:1.6;}
.hero button{
background:#fff;color:#003566;border:none;padding:14px 28px;border-radius:30px;font-weight:600;cursor:pointer;transition:.3s;
}
.hero button:hover{
box-shadow:0 0 25px rgba(255,255,255,0.85);
transform:translateY(-3px) scale(1.02);
}

/* SECTION */
.section{padding:90px 8%;border-top:1px solid #eef2f7}
.section h2{text-align:center;font-size:2.2rem;margin-bottom:50px;color:#003566;font-family:'Montserrat',sans-serif;}

/* COUNTER */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;text-align:center}
.stat{background:rgba(255,255,255,0.9);padding:40px;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,0.08);transition:.3s;}
.stat:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 15px 40px rgba(0,0,0,0.15);}
.stat h3{font-size:2rem;color:#003566;font-family:'Montserrat',sans-serif;}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px}
.card{
background:rgba(255,255,255,0.95);
border-radius:18px;padding:20px;text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:.35s;
backdrop-filter:blur(10px);
}
.card:hover{
transform:translateY(-12px) scale(1.02);
box-shadow:0 20px 45px rgba(0,0,0,0.18);
}
.card img{width:100%;border-radius:12px;margin-bottom:15px;cursor:pointer;transition:.3s;}
.card img:hover{transform:scale(1.05);}

/* LIGHTBOX */
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:9999;}
#lightbox img{max-width:90%;max-height:80%;border-radius:12px;box-shadow:0 0 35px rgba(255,255,255,0.3);animation:lightboxZoom .35s ease;pointer-events:none;}
@keyframes lightboxZoom{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.lightbox-btn{position:absolute;top:50%;transform:translateY(-50%);background:#ffffffcc;border:none;font-size:28px;padding:10px 16px;cursor:pointer;border-radius:8px;}
#prevBtn{left:40px} #nextBtn{right:40px}
#closeBtn{position:absolute;top:30px;right:40px;background:#ffffffcc;border:none;font-size:22px;padding:8px 14px;cursor:pointer;border-radius:8px;}

/* FORM */
.form-box{max-width:600px;margin:auto;background:rgba(255,255,255,0.95);padding:40px;border-radius:18px;box-shadow:0 10px 35px rgba(0,0,0,0.1);backdrop-filter:blur(10px);}
.form-box input,.form-box textarea{width:100%;padding:14px;margin:10px 0;border:1px solid #ddd;border-radius:8px;transition:.3s;}
.form-box input:focus,.form-box textarea:focus{border-color:#003566;outline:none;box-shadow:0 0 10px rgba(0,53,102,0.3);}
.form-box button{background:#003566;color:#fff;border:none;padding:14px;border-radius:8px;width:100%;cursor:pointer;transition:.3s;}
.form-box button:hover{background:#001d3d;box-shadow:0 0 15px rgba(0,53,102,0.4);}

/* PRODUCT ROW */
.product-row{display:flex;gap:10px;margin-top:10px;}
.product-row input{flex:1;}
@media(max-width:600px){.product-row{flex-direction:column;}}

.remove-btn{
background:#ff4d4d;
color:#fff;
border:none;
padding:0 12px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}
.remove-btn:hover{background:#cc0000;}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.contact-box{background:rgba(255,255,255,0.95);padding:40px;border-radius:18px;box-shadow:0 10px 35px rgba(0,0,0,0.08);backdrop-filter:blur(10px);}

/* FOOTER */
footer{background:#001d3d;color:#fff;text-align:center;padding:25px;border-radius:12px 12px 0 0;}

/* WHATSAPP */
.whatsapp-float{
position:fixed;bottom:25px;right:25px;background:#25D366;color:#fff;width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 6px 20px rgba(0,0,0,0.3);transition:.3s;}
.whatsapp-float:hover{transform:scale(1.1);}

/* SCROLL TO TOP */
#topBtn{position:fixed;bottom:100px;right:25px;background:#003566;color:#fff;border:none;width:55px;height:55px;border-radius:50%;font-size:22px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.25);}

/* MEDIA */
@media(max-width:900px){
header{padding:14px 5%}
nav a{margin-left:18px;font-size:14px}
.hero{flex-direction:column;text-align:center}
.products{grid-template-columns:1fr}
.contact-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- ALL YOUR SECTIONS ABOVE ARE UNCHANGED -->

<section class="section reveal" id="bulk">
<h2>Bulk Order Enquiry</h2>
<div class="form-box">
<form action="https://formsubmit.co/dpotographykp@gmail.com" method="POST">

<input type="hidden" name="_next" value="https://svpmedicare.github.io/final-repo/thankyou.html">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_subject" value="New Bulk Order Enquiry - SVP Medicare">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<div id="productRows">

<div class="product-row">
<input type="text" name="product[]" placeholder="Product Name" required>
<input type="number" name="quantity[]" placeholder="Quantity" min="1" required>
<button type="button" class="remove-btn" onclick="removeProductRow(this)">❌</button>
</div>

</div>

<button type="button" onclick="addProductRow()" style="margin:10px 0;background:#25D366">
➕ Add Another Product
</button>

<textarea name="message" rows="4" placeholder="Additional Notes (optional)"></textarea>

<button type="submit">Submit Enquiry</button>
</form>
</div>
</section>

<!-- ALL YOUR SECTIONS BELOW ARE UNCHANGED -->

<script>
// Add & Remove Product Rows
function addProductRow(){
const container=document.getElementById("productRows");

const row=document.createElement("div");
row.className="product-row";

row.innerHTML=`
<input type="text" name="product[]" placeholder="Product Name" required>
<input type="number" name="quantity[]" placeholder="Quantity" min="1" required>
<button type="button" class="remove-btn" onclick="removeProductRow(this)">❌</button>
`;

container.appendChild(row);
}

function removeProductRow(button){
const container=document.getElementById("productRows");
if(container.children.length>1){
button.parentElement.remove();
}
}
</script>

</body>
</html>
