<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVP Medicare LLP – Our Presence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  background: #f5f5f5;
}

header {
  background: #0b3d91;
  color: white;
  padding: 20px;
  font-size: 24px;
}

#backBtn {
  position: absolute;
  top: 25px;
  left: 25px;
  background: #003566;
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  z-index: 1000;
}

#backBtn:hover {
  background: #001d3d;
}

#map {
  height: 500px;
  width: 90%;
  margin: 20px auto;
  border-radius: 10px;
}

footer {
  margin-top: 20px;
  padding: 10px;
  background: #222;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
SVP Medicare LLP – Our Presence Across India
</header>

<a href="index.html" id="backBtn">← Back to Main Page</a>

<div id="map"></div>

<footer>
© 2026 SVP Medicare LLP | All Rights Reserved
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([22.9734, 78.6569], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var redIcon = new L.Icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
  iconSize: [32, 32],
  iconAnchor: [16, 32],
  popupAnchor: [0, -32]
});

var locations = [
  ["Vijayawada, Andhra Pradesh", 16.5062, 80.6480],
  ["Uttarakhand", 30.0668, 79.0193],
  ["Aligarh", 27.8974, 78.0880],
  ["Patna, Bihar", 25.5941, 85.1376],
  ["Delhi", 28.6139, 77.2090],
  ["Howrah, West Bengal", 22.5958, 88.2636],
  ["Jaipur, Rajasthan", 26.9124, 75.7873],
  ["Srinagar, Kashmir", 34.0837, 74.7973],
  ["Cuttack, Odisha", 20.4625, 85.8828],
  ["Ahmedabad, Gujarat", 23.0225, 72.5714],
  ["Ludhiana, Punjab", 30.9000, 75.8573],
  ["Guwahati, Assam", 26.1445, 91.7362],
  ["Chennai, Tamil Nadu", 13.0827, 80.2707],
  ["Pune, Maharashtra", 18.5204, 73.8567],
  ["Hyderabad, Telangana", 17.3850, 78.4867],
  ["Raipur, Chhattisgarh", 21.2514, 81.6296],
  ["Bangalore, Karnataka", 12.9716, 77.5946],
  ["Indore, Madhya Pradesh", 22.7196, 75.8577],
  ["Thane, Maharashtra", 19.2183, 72.9781],
  ["Nagpur, Maharashtra", 21.1458, 79.0882],
  ["Jammu", 32.7266, 74.8570],
  ["Lucknow, Uttar Pradesh", 26.8467, 80.9462]
];

locations.forEach(function(location) {
  L.marker([location[1], location[2]], {icon: redIcon})
    .addTo(map)
    .bindPopup(location[0]);
});
</script>

</body>
</html>
